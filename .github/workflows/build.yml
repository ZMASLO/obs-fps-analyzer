name: Build

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

env:
  OBS_VERSION: '31.0.0'
  OBS_DEPS_VERSION: '2024-09-12'

defaults:
  run:
    shell: bash

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-2022

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache OBS SDK
        id: cache-obs
        uses: actions/cache@v4
        with:
          path: obs-sdk
          key: obs-sdk-${{ env.OBS_VERSION }}-${{ env.OBS_DEPS_VERSION }}-v2

      - name: Setup OBS SDK
        if: steps.cache-obs.outputs.cache-hit != 'true'
        run: |
          # Download OBS deps (FFmpeg, jansson, zlib, etc.)
          curl -L -o obs-deps.zip \
            "https://github.com/obsproject/obs-deps/releases/download/${{ env.OBS_DEPS_VERSION }}/windows-deps-${{ env.OBS_DEPS_VERSION }}-x64.zip"
          7z x obs-deps.zip -oobs-deps

          # Clone OBS source with submodules (shallow to save time)
          git clone --recursive --shallow-submodules --depth 1 \
            --branch ${{ env.OBS_VERSION }} \
            https://github.com/obsproject/obs-studio.git obs-src

          # Configure OBS - only what's needed for libobs
          cmake -S obs-src -B obs-build \
            -G "Visual Studio 17 2022" -A x64 \
            -DCMAKE_PREFIX_PATH="${{ github.workspace }}/obs-deps" \
            -DENABLE_PLUGINS=OFF \
            -DENABLE_UI=OFF \
            -DENABLE_SCRIPTING=OFF

          # Build only libobs
          cmake --build obs-build --config Release --target libobs

          # Assemble SDK: headers + import library + cmake config
          mkdir -p obs-sdk/include obs-sdk/lib obs-sdk/lib/cmake/libobs

          # Copy headers from source
          cp obs-src/libobs/*.h obs-sdk/include/
          for dir in util callback media-io graphics; do
            mkdir -p "obs-sdk/include/$dir"
            cp obs-src/libobs/$dir/*.h "obs-sdk/include/$dir/" 2>/dev/null || true
          done

          # Copy generated config header
          find obs-build -name "obs-config.h" -exec cp {} obs-sdk/include/ \;

          # Copy import library
          find obs-build -name "obs.lib" -exec cp {} obs-sdk/lib/ \;

          # Verify import library was found
          ls -la obs-sdk/lib/obs.lib

          # Create cmake config for find_package(libobs)
          cat > obs-sdk/lib/cmake/libobs/libobsConfig.cmake << 'CMAKECFG'
          if(TARGET OBS::libobs)
            return()
          endif()
          get_filename_component(_prefix "${CMAKE_CURRENT_LIST_DIR}/../../../" ABSOLUTE)
          add_library(OBS::libobs SHARED IMPORTED)
          set_target_properties(OBS::libobs PROPERTIES
            INTERFACE_INCLUDE_DIRECTORIES "${_prefix}/include"
          )
          find_library(_libobs_lib NAMES obs libobs PATHS "${_prefix}/lib" NO_DEFAULT_PATH)
          if(_libobs_lib)
            set_target_properties(OBS::libobs PROPERTIES IMPORTED_IMPLIB "${_libobs_lib}")
          endif()
          unset(_prefix)
          CMAKECFG

          echo "=== OBS SDK ready ==="
          find obs-sdk -type f | head -30

      - name: Build plugin
        run: |
          cmake -S . -B build \
            -G "Visual Studio 17 2022" -A x64 \
            -DCMAKE_PREFIX_PATH="${{ github.workspace }}/obs-sdk"
          cmake --build build --config Release

      - name: Prepare artifact
        run: |
          mkdir -p release
          find build -name "fps-analyzer.dll" -exec cp {} release/ \;
          ls -la release/fps-analyzer.dll

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: fps-analyzer-dll
          path: release/fps-analyzer.dll

      - name: Create draft release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          files: release/fps-analyzer.dll
          body: |
            ## obs-fps-analyzer ${{ github.ref_name }}

            ### Installation
            1. Download `fps-analyzer.dll`
            2. Copy to `C:\Program Files\obs-studio\obs-plugins\64bit`
            3. Restart OBS Studio
