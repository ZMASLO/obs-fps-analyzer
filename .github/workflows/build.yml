name: Build

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

env:
  OBS_VERSION: '31.0.0'
  OBS_DEPS_VERSION: '2024-12-02'

jobs:
  build:
    runs-on: windows-2022

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache OBS SDK
        id: cache-obs
        uses: actions/cache@v4
        with:
          path: obs-sdk
          key: obs-sdk-${{ env.OBS_VERSION }}-${{ env.OBS_DEPS_VERSION }}

      - name: Download OBS deps
        if: steps.cache-obs.outputs.cache-hit != 'true'
        run: |
          curl -L -o obs-deps.zip "https://github.com/obsproject/obs-deps/releases/download/${{ env.OBS_DEPS_VERSION }}/windows-deps-x64-${{ env.OBS_DEPS_VERSION }}.zip"
          mkdir obs-deps
          cd obs-deps && unzip ../obs-deps.zip

      - name: Download OBS source
        if: steps.cache-obs.outputs.cache-hit != 'true'
        run: |
          curl -L -o obs-studio.tar.gz "https://github.com/obsproject/obs-studio/archive/refs/tags/${{ env.OBS_VERSION }}.tar.gz"
          tar xzf obs-studio.tar.gz

      - name: Build libobs
        if: steps.cache-obs.outputs.cache-hit != 'true'
        run: |
          cmake -S obs-studio-${{ env.OBS_VERSION }} -B obs-build \
            -G "Visual Studio 17 2022" -A x64 \
            -DCMAKE_PREFIX_PATH="${{ github.workspace }}/obs-deps" \
            -DENABLE_PLUGINS=OFF \
            -DENABLE_FRONTEND=OFF \
            -DENABLE_SCRIPTING=OFF \
            -DENABLE_UI=OFF
          cmake --build obs-build --config Release --target libobs

      - name: Install OBS SDK
        if: steps.cache-obs.outputs.cache-hit != 'true'
        run: |
          cmake --install obs-build --prefix "${{ github.workspace }}/obs-sdk" --component Development --config Release || true
          cmake --install obs-build --prefix "${{ github.workspace }}/obs-sdk" --config Release || true

          # Verify key files exist
          echo "=== Checking installed SDK ==="
          find obs-sdk -name "libobs.lib" -o -name "obs-config.h" -o -name "libobsConfig.cmake" 2>/dev/null || true
          ls -la obs-sdk/ || true

          # If cmake config not generated, create a minimal one
          if [ ! -f "obs-sdk/lib/cmake/libobs/libobsConfig.cmake" ]; then
            echo "Creating manual SDK layout..."

            # Copy headers from source
            mkdir -p obs-sdk/include
            cp -r obs-studio-${{ env.OBS_VERSION }}/libobs/*.h obs-sdk/include/ 2>/dev/null || true
            mkdir -p obs-sdk/include/util
            cp -r obs-studio-${{ env.OBS_VERSION }}/libobs/util/*.h obs-sdk/include/util/ 2>/dev/null || true
            mkdir -p obs-sdk/include/callback
            cp -r obs-studio-${{ env.OBS_VERSION }}/libobs/callback/*.h obs-sdk/include/callback/ 2>/dev/null || true
            mkdir -p obs-sdk/include/media-io
            cp -r obs-studio-${{ env.OBS_VERSION }}/libobs/media-io/*.h obs-sdk/include/media-io/ 2>/dev/null || true
            mkdir -p obs-sdk/include/graphics
            cp -r obs-studio-${{ env.OBS_VERSION }}/libobs/graphics/*.h obs-sdk/include/graphics/ 2>/dev/null || true

            # Copy generated config header
            cp obs-build/config/*.h obs-sdk/include/ 2>/dev/null || true
            find obs-build -name "obs-config.h" -exec cp {} obs-sdk/include/ \; 2>/dev/null || true
            find obs-build -name "obsconfig.h" -exec cp {} obs-sdk/include/ \; 2>/dev/null || true

            # Copy import library
            mkdir -p obs-sdk/lib
            find obs-build -name "obs.lib" -exec cp {} obs-sdk/lib/ \; 2>/dev/null || true
            find obs-build -name "libobs.lib" -exec cp {} obs-sdk/lib/ \; 2>/dev/null || true

            # Create cmake config
            mkdir -p obs-sdk/lib/cmake/libobs
            cat > obs-sdk/lib/cmake/libobs/libobsConfig.cmake << 'CMAKEOF'
          if(TARGET OBS::libobs)
            return()
          endif()

          get_filename_component(_import_prefix "${CMAKE_CURRENT_LIST_DIR}/../../../" ABSOLUTE)

          add_library(OBS::libobs SHARED IMPORTED)

          set_target_properties(OBS::libobs PROPERTIES
            INTERFACE_INCLUDE_DIRECTORIES "${_import_prefix}/include"
          )

          # Find the import library
          find_library(_libobs_lib NAMES obs libobs PATHS "${_import_prefix}/lib" NO_DEFAULT_PATH)
          if(_libobs_lib)
            set_target_properties(OBS::libobs PROPERTIES IMPORTED_IMPLIB "${_libobs_lib}")
          endif()

          unset(_import_prefix)
          CMAKEOF
          fi

          echo "=== Final SDK layout ==="
          find obs-sdk -type f | head -50

      - name: Build plugin
        run: |
          cmake -S . -B build \
            -G "Visual Studio 17 2022" -A x64 \
            -DCMAKE_PREFIX_PATH="${{ github.workspace }}/obs-sdk"
          cmake --build build --config Release

      - name: Prepare artifact
        run: |
          mkdir -p release
          find build -name "fps-analyzer.dll" -exec cp {} release/ \;

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: fps-analyzer-dll
          path: release/fps-analyzer.dll

      - name: Create release zip
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          cd release
          7z a ../fps-analyzer-${{ github.ref_name }}.zip fps-analyzer.dll

      - name: Create draft release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          files: fps-analyzer-${{ github.ref_name }}.zip
          body: |
            ## obs-fps-analyzer ${{ github.ref_name }}

            ### Installation
            1. Download `fps-analyzer-${{ github.ref_name }}.zip`
            2. Extract `fps-analyzer.dll`
            3. Copy to `C:\Program Files\obs-studio\obs-plugins\64bit`
            4. Restart OBS Studio
